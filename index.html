<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Rush X</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
overflow:hidden;
font-family:Arial,sans-serif;
background:#000;
}

#game{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
background:linear-gradient(#050b30,#091b60,#0f2d7d);
}

#score{
position:absolute;
top:15px;
left:15px;
color:#fff;
font-size:24px;
font-weight:bold;
z-index:999;
}

#player{
position:absolute;
bottom:100px;
left:50%;
transform:translateX(-50%);
font-size:55px;
z-index:10;
transition:left .15s;
}

.obstacle{
position:absolute;
width:60px;
height:60px;
background:#ff4444;
border-radius:8px;
}

.coin{
position:absolute;
font-size:28px;
}

#gameOver{
display:none;
position:absolute;
inset:0;
background:rgba(0,0,0,.85);
color:white;
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:28px;
}
</style>
</head>
<body>

<div id="game">

<div id="score">Score: 0</div>

<div id="player">🏃</div>

<div id="gameOver">
<div>GAME OVER</div>
<br>
<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>
const game=document.getElementById("game");
const player=document.getElementById("player");
const scoreText=document.getElementById("score");
const gameOver=document.getElementById("gameOver");

let score=0;
let lane=1;
let running=true;

const lanes=[
window.innerWidth*0.25,
window.innerWidth*0.5,
window.innerWidth*0.75
];

player.style.left=lanes[lane]+"px";

let jumpHeight=0;
let velocity=0;
let jumping=false;

function jump(){
if(jumping)return;
jumping=true;
velocity=18;
}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft"){
if(lane>0)lane--;
}

if(e.key==="ArrowRight"){
if(lane<2)lane++;
}

if(e.key==="ArrowUp"){
jump();
}

player.style.left=lanes[lane]+"px";
});

let startX=0;
let startY=0;

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX;
let endY=e.changedTouches[0].clientY;

let dx=endX-startX;
let dy=endY-startY;

if(Math.abs(dx)>Math.abs(dy)){

if(dx>50 && lane>0) lane--;

if(dx<-50 && lane<2) lane++;

player.style.left=lanes[lane]+"px";

}else{

if(dy<-50) jump();

}

});

function spawnObstacle(){

if(!running)return;

const obs=document.createElement("div");

obs.className="obstacle";

const laneIndex=Math.floor(Math.random()*3);

obs.style.left=(lanes[laneIndex]-30)+"px";

let y=-80;

game.appendChild(obs);

const move=setInterval(()=>{

if(!running){
clearInterval(move);
return;
}

y+=8;

obs.style.top=y+"px";

const p=player.getBoundingClientRect();
const o=obs.getBoundingClientRect();

if(
p.left<o.right &&
p.right>o.left &&
p.top<o.bottom &&
p.bottom>o.top &&
jumpHeight<40
){

running=false;

gameOver.style.display="flex";
}

if(y>window.innerHeight){

score++;

scoreText.innerText="Score: "+score;

obs.remove();

clearInterval(move);
}

},16);
}

function spawnCoin(){

if(!running)return;

const coin=document.createElement("div");

coin.className="coin";

coin.innerHTML="💎";

const laneIndex=Math.floor(Math.random()*3);

coin.style.left=(lanes[laneIndex]-15)+"px";

let y=-50;

game.appendChild(coin);

const move=setInterval(()=>{

if(!running){
clearInterval(move);
return;
}

y+=8;

coin.style.top=y+"px";

const p=player.getBoundingClientRect();
const c=coin.getBoundingClientRect();

if(
p.left<c.right &&
p.right>c.left &&
p.top<c.bottom &&
p.bottom>c.top
){

score+=5;

scoreText.innerText="Score: "+score;

coin.remove();

clearInterval(move);
}

if(y>window.innerHeight){

coin.remove();

clearInterval(move);
}

},16);

}

function gameLoop(){

if(jumping){

jumpHeight+=velocity;

velocity-=1;

if(jumpHeight<=0){

jumpHeight=0;

jumping=false;
}

player.style.bottom=(100+jumpHeight)+"px";
}

requestAnimationFrame(gameLoop);
}

gameLoop();

setInterval(spawnObstacle,1500);
setInterval(spawnCoin,1200);
</script>

</body>
